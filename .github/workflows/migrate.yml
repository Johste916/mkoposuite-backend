name: Run Sequelize Migrations

on:
  push:
    branches: [ main ]

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Show installed node modules
        run: ls -la node_modules/.bin

      - name: Show sequelize version
        run: npx sequelize-cli --version || echo "sequelize-cli not found"

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npx sequelize-cli db:migrate --config config/config.js || echo "Migration failed"
