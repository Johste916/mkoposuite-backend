name: Run Sequelize Migrations on Supabase

on:
  push:
    branches: [main]

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v3

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔎 Confirm DB connectivity
        run: |
          npm install --global pg
          echo "SELECT NOW();" | psql "${{ secrets.DATABASE_URL }}"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: 🛠 Run Sequelize migrations (direct path)
        run: |
          ./node_modules/.bin/sequelize-cli db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
