name: Run Sequelize Migrations on Supabase

on:
  push:
    branches: [main]

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Log Supabase DB Host (debug)
        run: echo "Connecting to Supabase at ${{ secrets.DATABASE_URL }}"

      - name: Run migrations
        run: npx sequelize-cli db:migrate --env production
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
