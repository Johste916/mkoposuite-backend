name: Run Sequelize Migrations

on:
  push:
    branches: [ main ]  # Change this if your branch is named 'master'

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install sequelize-cli globally
        run: npm install -g sequelize-cli

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: sequelize-cli db:migrate
